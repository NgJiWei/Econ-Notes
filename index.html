<script>
(function() {
  try {

    var root = document.getElementById('tree-root');
    if (!root) return;

    var treeData = {
      name: 'Economics',
      level: 0,
      expanded: true,
      color: '#9BBBF4',

      children: [

        /* =======================CHAPTER 1======================= */
		{
		  "name": "Lecture 1: Introduction to Economics",
		  "level": 1,
		  "expanded": true,
		  "color": "#7b3fe4",
		  "children": [
		    {
		      "name": "Four Types of Economic Resources (Factors of Production)",
		      "level": 2,
		      "color": "#b39df3",
		      "children": [
		        {
		          "name": "Land",
		          "level": 3,
		          "color": "#dcd4f7",
		          "children": [
		            {
		              "name": "Definition: All natural resources + physical land space for factories/construction",
		              "level": 4,
		              "color": "#ede9fa",
		              "leaf": true
		            },
		            {
		              "name": "Subcategories",
		              "level": 4,
		              "color": "#ede9fa",
		              "children": [
		                {
		                  "name": "Renewable resources: Trees, freshwater",
		                  "level": 5,
		                  "color": "#f4f1fc",
		                  "leaf": true
		                },
		                {
		                  "name": "Non-renewable resources: Petroleum, minerals, crude oil",
		                  "level": 5,
		                  "color": "#f4f1fc",
		                  "leaf": true
		                }
		              ]
		            },
		            {
		              "name": "Factor payment to owner: Rent",
		              "level": 4,
		              "color": "#ede9fa",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Labour",
		          "level": 3,
		          "color": "#dcd4f7",
		          "children": [
		            {
		              "name": "Definition: All physical + mental human effort devoted to production activities",
		              "level": 4,
		              "color": "#ede9fa",
		              "leaf": true
		            },
		            {
		              "name": "Scope: All production participants (clerks, teachers, factory line workers)",
		              "level": 4,
		              "color": "#ede9fa",
		              "leaf": true
		            },
		            {
		              "name": "Determinant of total national labour supply: Total population",
		              "level": 4,
		              "color": "#ede9fa",
		              "leaf": true
		            },
		            {
		              "name": "Factor payment to owner: Wages & salaries",
		              "level": 4,
		              "color": "#ede9fa",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Capital",
		          "level": 3,
		          "color": "#dcd4f7",
		          "children": [
		            {
		              "name": "Definition: Man-made manufactured goods used to produce other goods/services (not raw money)",
		              "level": 4,
		              "color": "#ede9fa",
		              "leaf": true
		            },
		            {
		              "name": "Examples: Factories, machinery, transport vehicles, plant infrastructure & equipment",
		              "level": 4,
		              "color": "#ede9fa",
		              "leaf": true
		            },
		            {
		              "name": "Factor payment to owner: Interest",
		              "level": 4,
		              "color": "#ede9fa",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Entrepreneur",
		          "level": 3,
		          "color": "#dcd4f7",
		          "children": [
		            {
		              "name": "Definition: Special human resource coordinating land, labour, capital together",
		              "level": 4,
		              "color": "#ede9fa",
		              "leaf": true
		            },
		            {
		              "name": "Core entrepreneurial functions",
		              "level": 4,
		              "color": "#ede9fa",
		              "children": [
		                {
		                  "name": "Make strategic business decisions (what to produce + how to produce it)",
		                  "level": 5,
		                  "color": "#f4f1fc",
		                  "leaf": true
		                },
		                {
		                  "name": "Undertake and absorb business risks",
		                  "level": 5,
		                  "color": "#f4f1fc",
		                  "leaf": true
		                },
		                {
		                  "name": "Act as innovator (launch new products, adopt new production technologies)",
		                  "level": 5,
		                  "color": "#f4f1fc",
		                  "leaf": true
		                }
		              ]
		            },
		            {
		              "name": "Factor payment to owner: Profit",
		              "level": 4,
		              "color": "#ede9fa",
		              "leaf": true
		            }
		          ]
		        }
		      ]
		    },
		    {
		      "name": "Fundamental Economic Problem – Scarcity, Choice & Opportunity Cost",
		      "level": 2,
		      "color": "#ffb380",
		      "children": [
		        {
		          "name": "Scarcity",
		          "level": 3,
		          "color": "#ffddcc",
		          "children": [
		            {
		              "name": "Two root causes of scarcity",
		              "level": 4,
		              "color": "#fff0e6",
		              "children": [
		                {
		                  "name": "Unlimited human wants: Desires for goods/services are infinite, cannot be fully satisfied even with high income",
		                  "level": 5,
		                  "color": "#fff7f0",
		                  "leaf": true
		                },
		                {
		                  "name": "Limited scarce resources: Land, labour, capital, entrepreneurship are finite, capping total societal output",
		                  "level": 5,
		                  "color": "#fff7f0",
		                  "leaf": true
		                }
		              ]
		            },
		            {
		              "name": "Formal Definition of Economics: Study of how individuals, firms, societies allocate scarce resources efficiently to satisfy unlimited human wants",
		              "level": 4,
		              "color": "#fff0e6",
		              "leaf": true
		            },
		            {
		              "name": "Etymology: Derived from Greek \"oikonomos\", meaning \"household manager\"; households face identical resource trade-offs (time, budget, shared resources)",
		              "level": 4,
		              "color": "#fff0e6",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Choice",
		          "level": 3,
		          "color": "#ffddcc",
		          "children": [
		            {
		              "name": "Logic: Scarcity creates unavoidable trade-offs; cannot consume all desired goods, must select some goods and sacrifice others",
		              "level": 4,
		              "color": "#fff0e6",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Opportunity Cost",
		          "level": 3,
		          "color": "#ffddcc",
		          "children": [
		            {
		              "name": "Definition: Value of the single best alternative forgone to obtain a selected good/option",
		              "level": 4,
		              "color": "#fff0e6",
		              "leaf": true
		            },
		            {
		              "name": "Decision rule: All rational economic decisions must explicitly consider opportunity cost",
		              "level": 4,
		              "color": "#fff0e6",
		              "leaf": true
		            },
		            {
		              "name": "Real example: Kobe Bryant skipped college to enter professional basketball; foregone college experience’s opportunity cost = millions of NBA career earnings",
		              "level": 4,
		              "color": "#fff0e6",
		              "leaf": true
		            }
		          ]
		        }
		      ]
		    },
		    {
		      "name": "Two Branches of Economics – Microeconomics vs Macroeconomics",
		      "level": 2,
		      "color": "#80c1ff",
		      "children": [
		        {
		          "name": "Microeconomics",
		          "level": 3,
		          "color": "#cce5ff",
		          "children": [
		            {
		              "name": "Focus scope: Individual economic units (households, single firms, isolated specific markets)",
		              "level": 4,
		              "color": "#e6f2ff",
		              "leaf": true
		            },
		            {
		              "name": "Core research themes: Household/firm individual decision-making; buyer-seller interactions within individual markets",
		              "level": 4,
		              "color": "#e6f2ff",
		              "leaf": true
		            },
		            {
		              "name": "Application examples: Impact of rent control on local housing market; effect of foreign competition on one specific domestic industry",
		              "level": 4,
		              "color": "#e6f2ff",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Macroeconomics",
		          "level": 3,
		          "color": "#cce5ff",
		          "children": [
		            {
		              "name": "Focus scope: Aggregate, economy-wide national/global total economic performance (the entire economy)",
		              "level": 4,
		              "color": "#e6f2ff",
		              "leaf": true
		            },
		            {
		              "name": "Core research themes: Total national output, unemployment, inflation, government fiscal deficits, national economic growth policy",
		              "level": 4,
		              "color": "#e6f2ff",
		              "leaf": true
		            },
		            {
		              "name": "Application examples: National unemployment rate trends; federal government budget deficits; national living standard growth strategies",
		              "level": 4,
		              "color": "#e6f2ff",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Practical Distinction Practice",
		          "level": 3,
		          "color": "#cce5ff",
		          "children": [
		            {
		              "name": "Micro-level example: Sharply rising local residential housing prices",
		              "level": 4,
		              "color": "#e6f2ff",
		              "leaf": true
		            },
		            {
		              "name": "Macro-level examples: Government fiscal deficit, national unemployment rate, central bank interest rate adjustments, overall import-export trade balance",
		              "level": 4,
		              "color": "#e6f2ff",
		              "leaf": true
		            }
		          ]
		        }
		      ]
		    },
		    {
		      "name": "Positive vs Normative Economic Statements",
		      "level": 2,
		      "color": "#70d670",
		      "children": [
		        {
		          "name": "Positive Statements (Descriptive Economics)",
		          "level": 3,
		          "color": "#c7f0c7",
		          "children": [
		            {
		              "name": "Core purpose: Objectively describe factual reality of how the economy is",
		              "level": 4,
		              "color": "#e6f9e6",
		              "leaf": true
		            },
		            {
		              "name": "Verifiability: Can be proven true or false using real-world data, statistics and empirical evidence",
		              "level": 4,
		              "color": "#e6f9e6",
		              "leaf": true
		            },
		            {
		              "name": "Example: “Minimum-wage legislation causes higher unemployment levels”",
		              "level": 4,
		              "color": "#e6f9e6",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Normative Statements (Prescriptive Economics)",
		          "level": 3,
		          "color": "#c7f0c7",
		          "children": [
		            {
		              "name": "Core purpose: Argue how the economy should operate; contains subjective personal value judgements",
		              "level": 4,
		              "color": "#e6f9e6",
		              "leaf": true
		            },
		            {
		              "name": "Verifiability: Cannot be confirmed or disproven purely with quantitative data; depends on personal moral & social values",
		              "level": 4,
		              "color": "#e6f9e6",
		              "leaf": true
		            },
		            {
		              "name": "Example: “The government ought to increase the legal minimum wage”",
		              "level": 4,
		              "color": "#e6f9e6",
		              "leaf": true
		            }
		          ]
		        }
		      ]
		    },
		    {
		      "name": "Production Possibilities Curve (PPC / PPF)",
		      "level": 2,
		      "color": "#e6739f",
		      "children": [
		        {
		          "name": "PPC Model Core Assumptions",
		          "level": 3,
		          "color": "#f7c6d9",
		          "children": [
		            {
		              "name": "Economy only produces two distinct types of goods",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            },
		            {
		              "name": "Total available resources (land, labour, capital, entrepreneur) are fixed in quantity",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            },
		            {
		              "name": "Production technology level and quality remain constant",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            },
		            {
		              "name": "Full employment condition: All resources are fully and efficiently utilised in production",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "PPC Formal Definition",
		          "level": 3,
		          "color": "#f7c6d9",
		          "children": [
		            {
		              "name": "Graphical model illustrating all maximum attainable output combinations of two goods an economy can produce under fixed resources & fixed technology",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Three Economic Concepts Illustrated by PPC",
		          "level": 3,
		          "color": "#f7c6d9",
		          "children": [
		            {
		              "name": "Concept 1: Scarcity → Any output combination outside the PPC is unattainable due to resource/technology limits",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            },
		            {
		              "name": "Concept 2: Choice → Economy selects only one output mix on the PPC at one time; trade-off between more Good A vs more Good B; all curve points = full productive efficiency",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            },
		            {
		              "name": "Concept 3: Opportunity Cost → Increasing production of one good requires reducing output of the other sacrificed good; sacrificed quantity = opportunity cost",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Law of Increasing Opportunity Cost",
		          "level": 3,
		          "color": "#f7c6d9",
		          "children": [
		            {
		              "name": "Rule: As production of one good rises, opportunity cost for each additional unit gradually increases",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            },
		            {
		              "name": "Root cause: Resources have unequal productivity across industries; shifting specialised resources to alternate production lowers marginal productivity, requiring larger sacrifice of the other good for equal output gains",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            },
		            {
		              "name": "Graph characteristic: PPC is concave (curves inward toward origin) to visually reflect this law",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Key Points & Zones on PPC Graph",
		          "level": 3,
		          "color": "#f7c6d9",
		          "children": [
		            {
		              "name": "Points ON PPC: Full resource employment + maximum productive economic efficiency",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            },
		            {
		              "name": "Points INSIDE PPC: Unemployment / productive inefficiency; idle unused resources; economy can produce more of both goods simultaneously",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            },
		            {
		              "name": "Points OUTSIDE PPC: Production unattainable under current resource and technology constraints (scarcity limit)",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "PPC Shifts = Economic Growth / Contraction",
		          "level": 3,
		          "color": "#f7c6d9",
		          "children": [
		            {
		              "name": "Outward Right Shift (Economic Growth): Economy can produce more of both goods",
		              "level": 4,
		              "color": "#fbe6ef",
		              "children": [
		                {
		                  "name": "Causes of outward shift",
		                  "level": 5,
		                  "color": "#fdf2f7",
		                  "children": [
		                    {
		                      "name": "Discovery or expansion of total resource supply",
		                      "level": 6,
		                      "color": "#fef7fa",
		                      "leaf": true
		                    },
		                    {
		                      "name": "Quality improvement of existing resources",
		                      "level": 6,
		                      "color": "#fef7fa",
		                      "leaf": true
		                    },
		                    {
		                      "name": "Technological innovation & advancement",
		                      "level": 6,
		                      "color": "#fef7fa",
		                      "leaf": true
		                    },
		                    {
		                      "name": "Expansion of working-age population size",
		                      "level": 6,
		                      "color": "#fef7fa",
		                      "leaf": true
		                    }
		                  ]
		                },
		                {
		                  "name": "Factors that DO NOT shift PPC: Reducing unemployment (only moves interior points onto curve), tax policy changes, general price level fluctuations, cuts to education spending",
		                  "level": 5,
		                  "color": "#fdf2f7",
		                  "leaf": true
		                }
		              ]
		            },
		            {
		              "name": "Inward Left Shift (Economic Contraction): Caused by resource loss, technological decline, natural disasters, labour force shrinkage",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Present vs Future Production Trade-off",
		          "level": 3,
		          "color": "#f7c6d9",
		          "children": [
		            {
		              "name": "Prioritising capital goods (future-oriented goods): Drives faster long-run outward PPC expansion",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            },
		            {
		              "name": "Prioritising consumer goods (present consumption goods): Small immediate sacrifice, but slower long-term economic growth",
		              "level": 4,
		              "color": "#fbe6ef",
		              "leaf": true
		            }
		          ]
		        }
		      ]
		    },
		    {
		      "name": "Three Fundamental Economic Questions (All Economic Systems Must Solve)",
		      "level": 2,
		      "color": "#cc9966",
		      "children": [
		        {
		          "name": "What to produce?",
		          "level": 3,
		          "color": "#e6ccb3",
		          "children": [
		            {
		              "name": "Explanation: Resource scarcity prevents producing every desired good; society chooses output combination (e.g., build new schools or public hospitals); determines final product mix",
		              "level": 4,
		              "color": "#f2e6dd",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "How to produce?",
		          "level": 3,
		          "color": "#e6ccb3",
		          "children": [
		            {
		              "name": "Explanation: Select production technique type (labour-intensive vs capital-intensive methods); determines resource allocation for manufacturing processes",
		              "level": 4,
		              "color": "#f2e6dd",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "For whom to produce?",
		          "level": 3,
		          "color": "#e6ccb3",
		          "children": [
		            {
		              "name": "Explanation: Decides distribution of finished goods/services across society, determined by household income levels; higher-income households afford premium, expensive products",
		              "level": 4,
		              "color": "#f2e6dd",
		              "leaf": true
		            }
		          ]
		        }
		      ]
		    },
		    {
		      "name": "Three Major Economic Systems (Classified by Government Intervention Level)",
		      "level": 2,
		      "color": "#9973e6",
		      "children": [
		        {
		          "name": "Command / Centrally Planned Economy",
		          "level": 3,
		          "color": "#d9ccf2",
		          "children": [
		            {
		              "name": "Core feature: Central government makes nearly all resource allocation and production decisions",
		              "level": 4,
		              "color": "#e9e0f7",
		              "leaf": true
		            },
		            {
		              "name": "Central planning covers all three fundamental economic questions",
		              "level": 4,
		              "color": "#e9e0f7",
		              "leaf": true
		            },
		            {
		              "name": "Advantages: High investment capacity, stable economic growth trajectory, prioritised social welfare objectives, low structural unemployment",
		              "level": 4,
		              "color": "#e9e0f7",
		              "leaf": true
		            },
		            {
		              "name": "Disadvantages: Information collection bottlenecks, high administrative overhead, weak producer profit incentives, persistent goods shortages or surplus gluts",
		              "level": 4,
		              "color": "#e9e0f7",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Free-Market Economy (Laissez-Faire)",
		          "level": 3,
		          "color": "#d9ccf2",
		          "children": [
		            {
		              "name": "Core feature: Minimal government intervention; all economic decisions made autonomously by private households and firms",
		              "level": 4,
		              "color": "#e9e0f7",
		              "leaf": true
		            },
		            {
		              "name": "Core operating mechanism: Price system as rationing tool; supply & demand regulate price movement; continuous interaction between goods markets and factor markets",
		              "level": 4,
		              "color": "#e9e0f7",
		              "leaf": true
		            },
		            {
		              "name": "Advantages: Prices transmit consumer/producer information efficiently, no heavy government bureaucratic costs, strong efficiency incentives, market responsiveness to consumer preferences",
		              "level": 4,
		              "color": "#e9e0f7",
		              "leaf": true
		            },
		            {
		              "name": "Disadvantages: Risk of monopoly power & market concentration, severe income inequality, tendency to ignore environmental harm and broader social externalities",
		              "level": 4,
		              "color": "#e9e0f7",
		              "leaf": true
		            }
		          ]
		        },
		        {
		          "name": "Mixed Economy",
		          "level": 3,
		          "color": "#d9ccf2",
		          "children": [
		            {
		              "name": "Core feature: Middle-ground hybrid system between command and free market; private market activity coexists with targeted government regulation",
		              "level": 4,
		              "color": "#e9e0f7",
		              "leaf": true
		            },
		            {
		              "name": "Government intervention policy tools",
		              "level": 4,
		              "color": "#e9e0f7",
		              "children": [
		                {
		                  "name": "Price intervention: Taxes, subsidies, direct legal price ceilings/floors",
		                  "level": 5,
		                  "color": "#f1ebfc",
		                  "leaf": true
		                },
		                {
		                  "name": "Income redistribution: Progressive income taxation, welfare transfer payments",
		                  "level": 5,
		                  "color": "#f1ebfc",
		                  "leaf": true
		                },
		                {
		                  "name": "Regulatory legislation: Rules governing production standards and consumer behaviour",
		                  "level": 5,
		                  "color": "#f1ebfc",
		                  "leaf": true
		                },
		                {
		                  "name": "Macroeconomic stabilisation policies: Counter-cyclical policies to smooth economic boom-bust cycles",
		                  "level": 5,
		                  "color": "#f1ebfc",
		                  "leaf": true
		                }
		              ]
		            }
		          ]
		        }
		      ]
		    }
		  ]
		},

        /* =======================CHAPTER 2======================= */
{
  "name": "Lecture 2: Demand, Supply and Markets",
  "level": 1,
  "expanded": true,
  "color": "#2b7bba",
  "children": [
    {
      "name": "1. Basic Concept: Competitive Market",
      "level": 2,
      "color": "#89b8e2",
      "children": [
        {
          "name": "Definition of a Market",
          "level": 3,
          "color": "#c1d8ee",
          "children": [
            {
              "name": "Any arrangement connecting buyers and sellers",
              "level": 4,
              "color": "#e0edf8",
              "leaf": true
            },
            {
              "name": "Forms: Physical stores, online global trading platforms/groups",
              "level": 4,
              "color": "#e0edf8",
              "leaf": true
            }
          ]
        },
        {
          "name": "Focus: Perfectly Competitive Market",
          "level": 3,
          "color": "#c1d8ee",
          "children": [
            {
              "name": "Characteristics: Large number of buyers + large number of sellers",
              "level": 4,
              "color": "#e0edf8",
              "leaf": true
            },
            {
              "name": "Market power: No single buyer/seller can influence or control market price",
              "level": 4,
              "color": "#e0edf8",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "2. Demand",
      "level": 2,
      "color": "#c84242",
      "children": [
        {
          "name": "2.1 Core Definitions",
          "level": 3,
          "color": "#f2b2b2",
          "children": [
            {
              "name": "Quantity Demanded",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Amount consumers willing & able to buy at a specific price, within a fixed time period (daily/monthly)",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Demand",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Overall relationship between product price and quantity demanded, ceteris paribus (all other variables constant)",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Demand Schedule",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Tabular table listing quantity demanded corresponding to each possible price",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Demand Curve",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Downward-sloping graphical illustration of price-quantity demanded relationship",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "2.2 Law of Demand",
          "level": 3,
          "color": "#f2b2b2",
          "children": [
            {
              "name": "Core Rule (Ceteris Paribus): Inverse/negative relationship between price and quantity demanded",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Price ↑ → Quantity Demanded ↓",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Price ↓ → Quantity Demanded ↑",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Two Underlying Explanatory Effects",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Income Effect: Higher price reduces consumer purchasing power, making consumers relatively poorer",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Substitution Effect: Consumers switch to cheaper alternative substitutes when this good’s price rises",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "2.3 Two Distinct Types of Demand Changes",
          "level": 3,
          "color": "#f2b2b2",
          "children": [
            {
              "name": "(1) Change in Quantity Demanded",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Trigger: Only the good’s own price changes",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Graphical Outcome: Movement along the existing fixed demand curve",
                  "level": 5,
                  "color": "#fcf0f0",
                  "children": [
                    {
                      "name": "Price rise → Move upward along curve",
                      "level": 6,
                      "color": "#fef6f6",
                      "leaf": true
                    },
                    {
                      "name": "Price fall → Move downward along curve",
                      "level": 6,
                      "color": "#fef6f6",
                      "leaf": true
                    }
                  ]
                }
              ]
            },
            {
              "name": "(2) Change in Demand (Entire Curve Shift)",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Trigger: Any variable EXCEPT the good’s own price changes",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Graphical Outcome: Full left/right shift of entire demand curve",
                  "level": 5,
                  "color": "#fcf0f0",
                  "children": [
                    {
                      "name": "Right shift = Demand Increase",
                      "level": 6,
                      "color": "#fef6f6",
                      "leaf": true
                    },
                    {
                      "name": "Left shift = Demand Decrease",
                      "level": 6,
                      "color": "#fef6f6",
                      "leaf": true
                    }
                  ]
                },
                {
                  "name": "Six Demand Shift Determinants",
                  "level": 5,
                  "color": "#fcf0f0",
                  "children": [
                    {
                      "name": "① Prices of Related Goods",
                      "level": 6,
                      "color": "#fef6f6",
                      "children": [
                        {
                          "name": "Substitutes (e.g. apples & oranges): Substitute Price ↑ → Demand for this good ↑",
                          "level": 7,
                          "color": "#fffafa",
                          "leaf": true
                        },
                        {
                          "name": "Complements (e.g. ice cream & syrup): Complement Price ↑ → Demand for this good ↓",
                          "level": 7,
                          "color": "#fffafa",
                          "leaf": true
                        }
                      ]
                    },
                    {
                      "name": "② Expected Future Prices",
                      "level": 6,
                      "color": "#fef6f6",
                      "children": [
                        {
                          "name": "Expect future price hike → Consumers purchase more now → Current demand rises",
                          "level": 7,
                          "color": "#fffafa",
                          "leaf": true
                        }
                      ]
                    },
                    {
                      "name": "③ Consumer Income",
                      "level": 6,
                      "color": "#fef6f6",
                      "children": [
                        {
                          "name": "Normal Goods: Income ↑ → Demand ↑",
                          "level": 7,
                          "color": "#fffafa",
                          "leaf": true
                        },
                        {
                          "name": "Inferior Goods: Income ↑ → Demand ↓",
                          "level": 7,
                          "color": "#fffafa",
                          "leaf": true
                        }
                      ]
                    },
                    {
                      "name": "④ Expected Future Income & Credit Conditions",
                      "level": 6,
                      "color": "#fef6f6",
                      "children": [
                        {
                          "name": "Optimistic income outlook / easier credit access → Higher demand (durable goods: cars, houses)",
                          "level": 7,
                          "color": "#fffafa",
                          "leaf": true
                        }
                      ]
                    },
                    {
                      "name": "⑤ Number of Buyers in Market",
                      "level": 6,
                      "color": "#fef6f6",
                      "children": [
                        {
                          "name": "More buyers enter market → Total market demand increases",
                          "level": 7,
                          "color": "#fffafa",
                          "leaf": true
                        }
                      ]
                    },
                    {
                      "name": "⑥ Consumer Preferences & Tastes",
                      "level": 6,
                      "color": "#fef6f6",
                      "children": [
                        {
                          "name": "New information, new products, trends alter consumer preference, shifting demand",
                          "level": 7,
                          "color": "#fffafa",
                          "leaf": true
                        }
                      ]
                    }
                  ]
                }
              ]
            }
          ]
        }
      ]
    },
    {
      "name": "3. Supply",
      "level": 2,
      "color": "#2b9b59",
      "children": [
        {
          "name": "3.1 Core Definitions",
          "level": 3,
          "color": "#a5ddbb",
          "children": [
            {
              "name": "Quantity Supplied",
              "level": 4,
              "color": "#d6efdf",
              "children": [
                {
                  "name": "Amount sellers willing & able to sell at a specific price over a fixed time period",
                  "level": 5,
                  "color": "#eaf7ef",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Supply",
              "level": 4,
              "color": "#d6efdf",
              "children": [
                {
                  "name": "Relationship between product price and quantity supplied, ceteris paribus (all selling-side factors constant)",
                  "level": 5,
                  "color": "#eaf7ef",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Supply Schedule",
              "level": 4,
              "color": "#d6efdf",
              "children": [
                {
                  "name": "Tabular table listing quantity supplied at different price levels",
                  "level": 5,
                  "color": "#eaf7ef",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Supply Curve",
              "level": 4,
              "color": "#d6efdf",
              "children": [
                {
                  "name": "Upward-sloping graph showing price-quantity supplied positive relationship",
                  "level": 5,
                  "color": "#eaf7ef",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "3.2 Law of Supply",
          "level": 3,
          "color": "#a5ddbb",
          "children": [
            {
              "name": "Core Rule (Ceteris Paribus): Positive/direct relationship between price and quantity supplied",
              "level": 4,
              "color": "#d6efdf",
              "children": [
                {
                  "name": "Price ↑ → Quantity Supplied ↑",
                  "level": 5,
                  "color": "#eaf7ef",
                  "leaf": true
                },
                {
                  "name": "Price ↓ → Quantity Supplied ↓",
                  "level": 5,
                  "color": "#eaf7ef",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "3.3 Two Distinct Types of Supply Changes",
          "level": 3,
          "color": "#a5ddbb",
          "children": [
            {
              "name": "(1) Change in Quantity Supplied",
              "level": 4,
              "color": "#d6efdf",
              "children": [
                {
                  "name": "Trigger: Only the good’s own price changes",
                  "level": 5,
                  "color": "#eaf7ef",
                  "leaf": true
                },
                {
                  "name": "Graphical Outcome: Movement along existing fixed supply curve",
                  "level": 5,
                  "color": "#eaf7ef",
                  "children": [
                    {
                      "name": "Price rise → Move upward along curve",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    },
                    {
                      "name": "Price fall → Move downward along curve",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    }
                  ]
                }
              ]
            },
            {
              "name": "(2) Change in Supply (Entire Curve Shift)",
              "level": 4,
              "color": "#d6efdf",
              "children": [
                {
                  "name": "Trigger: Any variable EXCEPT the good’s own price changes",
                  "level": 5,
                  "color": "#eaf7ef",
                  "leaf": true
                },
                {
                  "name": "Graphical Outcome: Full left/right shift of entire supply curve",
                  "level": 5,
                  "color": "#eaf7ef",
                  "children": [
                    {
                      "name": "Right shift = Supply Increase",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    },
                    {
                      "name": "Left shift = Supply Decrease",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    }
                  ]
                },
                {
                  "name": "Six Supply Shift Determinants",
                  "level": 5,
                  "color": "#eaf7ef",
                  "children": [
                    {
                      "name": "① Prices of Related Production Goods",
                      "level": 6,
                      "color": "#f3faf6",
                      "children": [
                        {
                          "name": "Production Substitutes (trucks & SUVs): Substitute Price ↑ → Supply of this good ↓",
                          "level": 7,
                          "color": "#f8fcfb",
                          "leaf": true
                        },
                        {
                          "name": "Production Complements (milk & cream): Complement Price ↑ → Supply of this good ↑",
                          "level": 7,
                          "color": "#f8fcfb",
                          "leaf": true
                        }
                      ]
                    },
                    {
                      "name": "② Input / Resource Prices",
                      "level": 6,
                      "color": "#f3faf6",
                      "children": [
                        {
                          "name": "Raw material cost ↑ → Production cost rises → Firm reduces supply",
                          "level": 7,
                          "color": "#f8fcfb",
                          "leaf": true
                        }
                      ]
                    },
                    {
                      "name": "③ Expected Future Prices",
                      "level": 6,
                      "color": "#f3faf6",
                      "children": [
                        {
                          "name": "Expect future price increase → Firms hold inventory → Reduce current supply",
                          "level": 7,
                          "color": "#f8fcfb",
                          "leaf": true
                        }
                      ]
                    },
                    {
                      "name": "④ Number of Sellers / Firms in Industry",
                      "level": 6,
                      "color": "#f3faf6",
                      "children": [
                        {
                          "name": "More firms enter market → Total market supply increases",
                          "level": 7,
                          "color": "#f8fcfb",
                          "leaf": true
                        }
                      ]
                    },
                    {
                      "name": "⑤ Productivity & Technology",
                      "level": 6,
                      "color": "#f3faf6",
                      "children": [
                        {
                          "name": "Tech improvement / higher operational efficiency → Lower production cost → Supply ↑",
                          "level": 7,
                          "color": "#f8fcfb",
                          "leaf": true
                        },
                        {
                          "name": "Natural disasters / equipment failure → Lower productivity → Supply ↓",
                          "level": 7,
                          "color": "#f8fcfb",
                          "leaf": true
                        }
                      ]
                    }
                  ]
                }
              ]
            }
          ]
        }
      ]
    },
    {
      "name": "4. Market Equilibrium",
      "level": 2,
      "color": "#904fc2",
      "children": [
        {
          "name": "4.1 Definition",
          "level": 3,
          "color": "#d1b9eb",
          "children": [
            {
              "name": "Equilibrium Condition: Quantity Demanded (Qd) = Quantity Supplied (Qs)",
              "level": 4,
              "color": "#e9ddf6",
              "leaf": true
            },
            {
              "name": "Graph location: Intersection point of demand curve and supply curve",
              "level": 4,
              "color": "#e9ddf6",
              "leaf": true
            },
            {
              "name": "Equilibrium Price: Market price where Qd matches Qs",
              "level": 4,
              "color": "#e9ddf6",
              "leaf": true
            },
            {
              "name": "Equilibrium Quantity: Volume of goods traded at equilibrium price",
              "level": 4,
              "color": "#e9ddf6",
              "leaf": true
            }
          ]
        },
        {
          "name": "4.2 Law of Market Forces (Automatic Price Self-Adjustment Mechanism)",
          "level": 3,
          "color": "#d1b9eb",
          "children": [
            {
              "name": "Surplus (Excess Supply): Qs > Qd",
              "level": 4,
              "color": "#e9ddf6",
              "children": [
                {
                  "name": "Sellers cut prices to clear unsold inventory; price falls automatically until surplus eliminated, back to equilibrium",
                  "level": 5,
                  "color": "#f3ecfb",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Shortage (Excess Demand): Qd > Qs",
              "level": 4,
              "color": "#e9ddf6",
              "children": [
                {
                  "name": "Buyers compete and bid prices upward; price rises automatically until shortage eliminated, back to equilibrium",
                  "level": 5,
                  "color": "#f3ecfb",
                  "leaf": true
                }
              ]
            }
          ]
        }
      ]
    },
    {
      "name": "5. How Demand & Supply Shifts Change Market Equilibrium",
      "level": 2,
      "color": "#c28727",
      "children": [
        {
          "name": "Standard 3-Step Analysis Framework for Any Market Shock",
          "level": 3,
          "color": "#f2d2a9",
          "children": [
            {
              "name": "Step 1: Identify whether the event impacts demand side or supply side",
              "level": 4,
              "color": "#f9e9d9",
              "leaf": true
            },
            {
              "name": "Step 2: Determine if demand/supply increases (right shift) or decreases (left shift)",
              "level": 4,
              "color": "#f9e9d9",
              "leaf": true
            },
            {
              "name": "Step 3: Compare new equilibrium price & quantity against original equilibrium values",
              "level": 4,
              "color": "#f9e9d9",
              "leaf": true
            }
          ]
        },
        {
          "name": "5.1 Only Demand Shifts (Supply Curve Remains Unchanged)",
          "level": 3,
          "color": "#f2d2a9",
          "children": [
            {
              "name": "Demand Increase (Right Shift)",
              "level": 4,
              "color": "#f9e9d9",
              "children": [
                {
                  "name": "Temporary shortage forms → New Equilibrium: Price ↑, Quantity ↑",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Demand Decrease (Left Shift)",
              "level": 4,
              "color": "#f9e9d9",
              "children": [
                {
                  "name": "Temporary surplus forms → New Equilibrium: Price ↓, Quantity ↓",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Rule: Equilibrium price and quantity move in the same direction as demand change",
              "level": 4,
              "color": "#f9e9d9",
              "leaf": true
            }
          ]
        },
        {
          "name": "5.2 Only Supply Shifts (Demand Curve Remains Unchanged)",
          "level": 3,
          "color": "#f2d2a9",
          "children": [
            {
              "name": "Supply Increase (Right Shift)",
              "level": 4,
              "color": "#f9e9d9",
              "children": [
                {
                  "name": "Temporary surplus forms → New Equilibrium: Price ↓, Quantity ↑",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Supply Decrease (Left Shift)",
              "level": 4,
              "color": "#f9e9d9",
              "children": [
                {
                  "name": "Temporary shortage forms → New Equilibrium: Price ↑, Quantity ↓",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Rule: Equilibrium price moves opposite to supply change; quantity moves same direction as supply change",
              "level": 4,
              "color": "#f9e9d9",
              "leaf": true
            }
          ]
        },
        {
          "name": "5.3 Simultaneous Shift of Both Demand & Supply",
          "level": 3,
          "color": "#f2d2a9",
          "children": [
            {
              "name": "Case 1: Demand ↑ + Supply ↑",
              "level": 4,
              "color": "#f9e9d9",
              "children": [
                {
                  "name": "Definite outcome: Equilibrium Quantity rises",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                },
                {
                  "name": "Uncertain outcome: Equilibrium Price (depends on relative size of two curve shifts)",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Case 2: Demand ↓ + Supply ↓",
              "level": 4,
              "color": "#f9e9d9",
              "children": [
                {
                  "name": "Definite outcome: Equilibrium Quantity falls",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                },
                {
                  "name": "Uncertain outcome: Equilibrium Price (depends on relative size of two curve shifts)",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Case 3: Demand ↑ + Supply ↓",
              "level": 4,
              "color": "#f9e9d9",
              "children": [
                {
                  "name": "Definite outcome: Equilibrium Price rises",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                },
                {
                  "name": "Uncertain outcome: Equilibrium Quantity (depends on relative size of two curve shifts)",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Case 4: Demand ↓ + Supply ↑",
              "level": 4,
              "color": "#f9e9d9",
              "children": [
                {
                  "name": "Definite outcome: Equilibrium Price falls",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                },
                {
                  "name": "Uncertain outcome: Equilibrium Quantity (depends on relative size of two curve shifts)",
                  "level": 5,
                  "color": "#fdf4eb",
                  "leaf": true
                }
              ]
            }
          ]
        }
      ]
    }
  ]
},

        /* =======================CHAPTER 3======================= */
{
  "name": "Lecture 3: Elasticity",
  "level": 1,
  "expanded": true,
  "color": "#5a2d82",
  "children": [
    {
      "name": "1. Core Concept of Elasticity",
      "level": 2,
      "color": "#b39ddb",
      "children": [
        {
          "name": "Definition: Measures responsiveness of quantity demanded/supplied to changes in price, income, or related goods’ prices",
          "level": 3,
          "color": "#dcd4f0",
          "leaf": true
        },
        {
          "name": "Purpose: Overcomes limitation of basic demand/supply law (only shows direction of change, not magnitude of change)",
          "level": 3,
          "color": "#dcd4f0",
          "leaf": true
        }
      ]
    },
    {
      "name": "2. Price Elasticity of Demand (PED)",
      "level": 2,
      "color": "#c95151",
      "children": [
        {
          "name": "2.1 Definition & Formula",
          "level": 3,
          "color": "#f2b2b2",
          "children": [
            {
              "name": "Core Formula: PED = %ΔQ_d / %ΔP",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            },
            {
              "name": "Sign Property: Intrinsically negative (inverse relationship between price and quantity demanded); absolute value used for analysis",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            },
            {
              "name": "Midpoint (Average) Method",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Function: Eliminates inconsistent elasticity results from different starting/ending points",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Percentage Change Formula: %Δ = [(End − Start) / ((Start + End) ÷ 2)] × 100",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "2.2 Five Types of PED (Classified by Absolute Value)",
          "level": 3,
          "color": "#f2b2b2",
          "children": [
            {
              "name": "Perfectly Inelastic (PED = 0)",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Curve Shape: Vertical demand curve",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Quantity demanded unchanged regardless of price fluctuation",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Example: Essential emergency medicine",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Inelastic (0 < PED < 1)",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Curve Shape: Steep demand curve",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Percentage change in quantity < percentage change in price",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Example: Staple food, daily necessities",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Unit Elastic (PED = 1)",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Curve Shape: Moderate-slope demand curve",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Percentage change in quantity = percentage change in price",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Elastic (PED > 1)",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Curve Shape: Flat demand curve",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Percentage change in quantity > percentage change in price",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Example: Luxury travel, branded goods with many substitutes",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Perfectly Elastic (PED = ∞)",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Curve Shape: Horizontal demand curve",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Minimal price increase reduces quantity demanded to zero",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "2.3 Determinants of More Elastic Demand",
          "level": 3,
          "color": "#f2b2b2",
          "children": [
            {
              "name": "Availability of many close substitute products",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            },
            {
              "name": "Good accounts for a large proportion of consumer total income",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            },
            {
              "name": "Classified as luxury goods instead of necessities",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            },
            {
              "name": "Longer time period for consumers to adjust consumption habits",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            },
            {
              "name": "Narrow product definition (e.g., one chocolate brand vs. all chocolate products)",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            }
          ]
        },
        {
          "name": "2.4 Total Revenue (TR = P × Q) Test for PED",
          "level": 3,
          "color": "#f2b2b2",
          "children": [
            {
              "name": "Elastic Demand (PED > 1)",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Price ↑ → Total Revenue ↓",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Price ↓ → Total Revenue ↑",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Firm Strategy: Cut prices to raise total revenue",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Inelastic Demand (PED < 1)",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Price ↑ → Total Revenue ↑",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Price ↓ → Total Revenue ↓",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                },
                {
                  "name": "Firm Strategy: Raise prices to raise total revenue",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Unit Elastic Demand (PED = 1)",
              "level": 4,
              "color": "#f9dede",
              "children": [
                {
                  "name": "Any price change leaves total revenue unchanged",
                  "level": 5,
                  "color": "#fcf0f0",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Special Property of Linear Demand Curve: Fixed slope, variable elasticity (elastic at high price range; inelastic at low price range)",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "3. Other Demand-Related Elasticities",
      "level": 2,
      "color": "#34a867",
      "children": [
        {
          "name": "3.1 Cross Elasticity of Demand (XED)",
          "level": 3,
          "color": "#a5ddbb",
          "children": [
            {
              "name": "Formula: XED = %ΔQ_d(Good Y) / %ΔP(Good X)",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            },
            {
              "name": "Classification by XED Value",
              "level": 4,
              "color": "#d6efdf",
              "children": [
                {
                  "name": "Positive XED = Substitute Goods",
                  "level": 5,
                  "color": "#eaf7ef",
                  "children": [
                    {
                      "name": "Logic: Price rise of one good increases demand for the other",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    },
                    {
                      "name": "Example: Tea & coffee",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    }
                  ]
                },
                {
                  "name": "Negative XED = Complementary Goods",
                  "level": 5,
                  "color": "#eaf7ef",
                  "children": [
                    {
                      "name": "Logic: Price rise of one good decreases demand for the other",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    },
                    {
                      "name": "Example: Cars & tyres",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    }
                  ]
                },
                {
                  "name": "XED ≈ 0 = Unrelated/Independent Goods",
                  "level": 5,
                  "color": "#eaf7ef",
                  "children": [
                    {
                      "name": "Example: Cars & sofas",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    }
                  ]
                }
              ]
            },
            {
              "name": "Business Application: Predict pricing impact from competitors; coordinate pricing strategy for complementary product bundles",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            }
          ]
        },
        {
          "name": "3.2 Income Elasticity of Demand (YED)",
          "level": 3,
          "color": "#a5ddbb",
          "children": [
            {
              "name": "Formula: YED = %ΔQ_d / %ΔY (Y = consumer income)",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            },
            {
              "name": "Positive YED = Normal Goods",
              "level": 4,
              "color": "#d6efdf",
              "children": [
                {
                  "name": "Necessities (0 < YED < 1)",
                  "level": 5,
                  "color": "#eaf7ef",
                  "children": [
                    {
                      "name": "Characteristic: Demand grows slower than income growth",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    },
                    {
                      "name": "Example: Daily staple food",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    }
                  ]
                },
                {
                  "name": "Luxuries (YED > 1)",
                  "level": 5,
                  "color": "#eaf7ef",
                  "children": [
                    {
                      "name": "Characteristic: Demand grows faster than income growth",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    },
                    {
                      "name": "Example: Overseas holidays",
                      "level": 6,
                      "color": "#f3faf6",
                      "leaf": true
                    }
                  ]
                }
              ]
            },
            {
              "name": "Negative YED = Inferior Goods",
              "level": 4,
              "color": "#d6efdf",
              "children": [
                {
                  "name": "Characteristic: Higher consumer income leads to lower purchase quantity",
                  "level": 5,
                  "color": "#eaf7ef",
                  "leaf": true
                },
                {
                  "name": "Example: Low-cost generic food",
                  "level": 5,
                  "color": "#eaf7ef",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Business Application: Forecast overall market expansion/contraction with household income fluctuations",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "4. Price Elasticity of Supply (PES)",
      "level": 2,
      "color": "#298996",
      "children": [
        {
          "name": "4.1 Definition & Formula",
          "level": 3,
          "color": "#a3d4db",
          "children": [
            {
              "name": "Formula: PES = %ΔQ_s / %ΔP",
              "level": 4,
              "color": "#d2e9ed",
              "leaf": true
            },
            {
              "name": "Sign Property: Always positive (law of supply: price and quantity supplied move in same direction)",
              "level": 4,
              "color": "#d2e9ed",
              "leaf": true
            }
          ]
        },
        {
          "name": "4.2 Five Types of PES",
          "level": 3,
          "color": "#a3d4db",
          "children": [
            {
              "name": "Perfectly Inelastic (PES = 0)",
              "level": 4,
              "color": "#d2e9ed",
              "children": [
                {
                  "name": "Curve Shape: Vertical supply curve",
                  "level": 5,
                  "color": "#e4f3f6",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Fixed output level regardless of price",
                  "level": 5,
                  "color": "#e4f3f6",
                  "leaf": true
                },
                {
                  "name": "Example: Rare antique artwork",
                  "level": 5,
                  "color": "#e4f3f6",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Inelastic (0 < PES < 1)",
              "level": 4,
              "color": "#d2e9ed",
              "children": [
                {
                  "name": "Curve Shape: Steep supply curve",
                  "level": 5,
                  "color": "#e4f3f6",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Percentage increase in supplied quantity < percentage price increase",
                  "level": 5,
                  "color": "#e4f3f6",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Unit Elastic (PES = 1)",
              "level": 4,
              "color": "#d2e9ed",
              "children": [
                {
                  "name": "Curve Shape: Moderate-slope supply curve",
                  "level": 5,
                  "color": "#e4f3f6",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Percentage change in quantity supplied = percentage price change",
                  "level": 5,
                  "color": "#e4f3f6",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Elastic (PES > 1)",
              "level": 4,
              "color": "#d2e9ed",
              "children": [
                {
                  "name": "Curve Shape: Flat supply curve",
                  "level": 5,
                  "color": "#e4f3f6",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Percentage increase in supplied quantity > percentage price increase",
                  "level": 5,
                  "color": "#e4f3f6",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Perfectly Elastic (PES = ∞)",
              "level": 4,
              "color": "#d2e9ed",
              "children": [
                {
                  "name": "Curve Shape: Horizontal supply curve",
                  "level": 5,
                  "color": "#e4f3f6",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Producers supply unlimited output at a fixed market price",
                  "level": 5,
                  "color": "#e4f3f6",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "4.3 Determinants of More Elastic Supply",
          "level": 3,
          "color": "#a3d4db",
          "children": [
            {
              "name": "Low marginal extra costs to expand production output",
              "level": 4,
              "color": "#d2e9ed",
              "leaf": true
            },
            {
              "name": "Excess factory production capacity + abundant raw material inventory",
              "level": 4,
              "color": "#d2e9ed",
              "leaf": true
            },
            {
              "name": "Easy substitution/replacement of production input resources",
              "level": 4,
              "color": "#d2e9ed",
              "leaf": true
            },
            {
              "name": "Longer time horizon (firms can build new factories, recruit more labour in long run to scale production)",
              "level": 4,
              "color": "#d2e9ed",
              "leaf": true
            }
          ]
        }
      ]
    }
  ]
},

/* =======================CHAPTER 4======================= */
{
  "name": "Lecture 4: Costs of Production",
  "level": 1,
  "expanded": true,
  "color": "#6b3fa0",
  "children": [
    {
      "name": "1. Core Cost Foundation: Opportunity Cost",
      "level": 2,
      "color": "#b9a3d9",
      "children": [
        {
          "name": "Definition of Opportunity Cost",
          "level": 3,
          "color": "#dcd0ed",
          "children": [
            {
              "name": "Root cause: Scarce resources with competing alternative uses",
              "level": 4,
              "color": "#ede6f7",
              "leaf": true
            },
            {
              "name": "True cost = Value of highest-valued forgone alternative",
              "level": 4,
              "color": "#ede6f7",
              "leaf": true
            }
          ]
        },
        {
          "name": "Two types of Opportunity Cost",
          "level": 3,
          "color": "#dcd0ed",
          "children": [
            {
              "name": "1.1 Explicit Costs",
              "level": 4,
              "color": "#ede6f7",
              "children": [
                {
                  "name": "Feature: Direct monetary cash payment to external suppliers",
                  "level": 5,
                  "color": "#f4f0fc",
                  "leaf": true
                },
                {
                  "name": "Counted by: Both accountants & economists",
                  "level": 5,
                  "color": "#f4f0fc",
                  "leaf": true
                },
                {
                  "name": "Examples: Wages, rent, raw material fees, transportation costs",
                  "level": 5,
                  "color": "#f4f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "1.2 Implicit Costs",
              "level": 4,
              "color": "#ede6f7",
              "children": [
                {
