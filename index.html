                  "name": "Feature: No cash payment; cost of self-owned resources",
                  "level": 5,
                  "color": "#f4f0fc",
                  "leaf": true
                },
                {
                  "name": "Counted by: Only economists (ignored by accountants)",
                  "level": 5,
                  "color": "#f4f0fc",
                  "leaf": true
                },
                {
                  "name": "Examples: Foregone salary, forgone interest on own capital, implicit rental income of owned premises, opportunity cost of the entrepreneur’s time",
                  "level": 5,
                  "color": "#f4f0fc",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "Two Profit Calculations",
          "level": 3,
          "color": "#dcd0ed",
          "children": [
            {
              "name": "1.3 Accounting Profit",
              "level": 4,
              "color": "#ede6f7",
              "children": [
                {
                  "name": "Formula: Total Revenue − Explicit Costs",
                  "level": 5,
                  "color": "#f4f0fc",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Larger value, only records tangible money expenses",
                  "level": 5,
                  "color": "#f4f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "1.4 Economic Profit",
              "level": 4,
              "color": "#ede6f7",
              "children": [
                {
                  "name": "Formula: Total Revenue − (Explicit Costs + Implicit Costs) = Total Revenue − Economic Costs",
                  "level": 5,
                  "color": "#f4f0fc",
                  "leaf": true
                },
                {
                  "name": "Characteristic: Smaller value, includes all opportunity costs",
                  "level": 5,
                  "color": "#f4f0fc",
                  "leaf": true
                },
                {
                  "name": "Calculation Example (Gomez Pottery)",
                  "level": 5,
                  "color": "#f4f0fc",
                  "children": [
                    {
                      "name": "Total Revenue = $72,000",
                      "level": 6,
                      "color": "#f8f5fe",
                      "leaf": true
                    },
                    {
                      "name": "Explicit Costs = $12,000 wage + $5,000 rent + $20,000 materials = $37,000",
                      "level": 6,
                      "color": "#f8f5fe",
                      "leaf": true
                    },
                    {
                      "name": "Implicit Costs = $4,000 forgone interest + $15,000 forgone salary + $3,000 entrepreneur value = $22,000",
                      "level": 6,
                      "color": "#f8f5fe",
                      "leaf": true
                    },
                    {
                      "name": "Accounting Profit = $72,000 − $37,000 = $35,000",
                      "level": 6,
                      "color": "#f8f5fe",
                      "leaf": true
                    },
                    {
                      "name": "Economic Profit = $72,000 − $37,000 − $22,000 = $13,000",
                      "level": 6,
                      "color": "#f8f5fe",
                      "leaf": true
                    }
                  ]
                }
              ]
            }
          ]
        }
      ]
    },
    {
      "name": "2. Production Time Horizons: Short Run vs Long Run",
      "level": 2,
      "color": "#4a9678",
      "children": [
        {
          "name": "2.1 Short Run",
          "level": 3,
          "color": "#a9d8c5",
          "children": [
            {
              "name": "Rule: At least one factor of production is fixed (capital/machinery/factory)",
              "level": 4,
              "color": "#d9ede3",
              "leaf": true
            },
            {
              "name": "Adjustable input: Only variable inputs (labour, raw materials)",
              "level": 4,
              "color": "#d9ede3",
              "leaf": true
            },
            {
              "name": "Example: Fixed 10 machines; can hire/fire workers, cannot buy new machines",
              "level": 4,
              "color": "#d9ede3",
              "leaf": true
            },
            {
              "name": "Cost feature: Exist both fixed costs + variable costs",
              "level": 4,
              "color": "#d9ede3",
              "leaf": true
            }
          ]
        },
        {
          "name": "2.2 Long Run",
          "level": 3,
          "color": "#a9d8c5",
          "children": [
            {
              "name": "Rule: All factors of production are fully variable",
              "level": 4,
              "color": "#d9ede3",
              "leaf": true
            },
            {
              "name": "Firm-level flexibility: Adjust factory size, equipment, workforce, all inputs",
              "level": 4,
              "color": "#d9ede3",
              "leaf": true
            },
            {
              "name": "Industry-level feature: New firms enter market; old firms shut down & exit",
              "level": 4,
              "color": "#d9ede3",
              "leaf": true
            },
            {
              "name": "Cost feature: Zero fixed costs; all costs are variable",
              "level": 4,
              "color": "#d9ede3",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "3. Short-Run Production Theory & Product Metrics",
      "level": 2,
      "color": "#c27a36",
      "children": [
        {
          "name": "3.1 Short-run Production Function",
          "level": 3,
          "color": "#f2ccaa",
          "children": [
            {
              "name": "Assumption: Capital (K) fixed; Labour (L) variable",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Formula: Q = F(𝐾̄, L)",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            }
          ]
        },
        {
          "name": "3.2 Three Core Product Measurements",
          "level": 3,
          "color": "#f2ccaa",
          "children": [
            {
              "name": "TPP (Total Physical Product / TP)",
              "level": 4,
              "color": "#f9e6d7",
              "children": [
                {
                  "name": "Definition: Total output produced with given labour quantity",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                }
              ]
            },
            {
              "name": "MPP (Marginal Physical Product / MP)",
              "level": 4,
              "color": "#f9e6d7",
              "children": [
                {
                  "name": "Definition: Extra output from adding 1 unit of variable labour",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                },
                {
                  "name": "Formula: MPP = ΔTPP / ΔL",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                }
              ]
            },
            {
              "name": "APP (Average Physical Product / AP)",
              "level": 4,
              "color": "#f9e6d7",
              "children": [
                {
                  "name": "Definition: Output per unit of labour input",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                },
                {
                  "name": "Formula: APP = TPP / L",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "3.3 Law of Diminishing Marginal Returns (Core Rule)",
          "level": 3,
          "color": "#f2ccaa",
          "children": [
            {
              "name": "Definition: Add variable input to fixed input; after threshold, each extra labour unit yields smaller MPP",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Stage 1: Increasing Marginal Returns",
              "level": 4,
              "color": "#f9e6d7",
              "children": [
                {
                  "name": "MPP rises, TPP grows at increasing speed",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                },
                {
                  "name": "Reason: Fixed capital underutilized; workers have enough equipment/space",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Stage 2: Diminishing Marginal Returns (Positive MPP)",
              "level": 4,
              "color": "#f9e6d7",
              "children": [
                {
                  "name": "MPP falls, TPP still rises but slower",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                },
                {
                  "name": "Reason: Fixed capital crowded; workers share limited facilities",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Stage 3: Negative Marginal Returns",
              "level": 4,
              "color": "#f9e6d7",
              "children": [
                {
                  "name": "MPP negative, TPP declines",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                },
                {
                  "name": "Reason: Excess labour overcrowds factory, creates inefficiency",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "3.4 MPP & APP Relationship",
          "level": 3,
          "color": "#f2ccaa",
          "children": [
            {
              "name": "If MPP > APP → APP rises",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "If MPP < APP → APP falls",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "MPP intersects APP at APP’s maximum point",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "4. Short-Run Production Costs & Cost Curves",
      "level": 2,
      "color": "#2e75b5",
      "children": [
        {
          "name": "4.1 Total Cost Components",
          "level": 3,
          "color": "#a4c7e6",
          "children": [
            {
              "name": "TFC (Total Fixed Cost)",
              "level": 4,
              "color": "#d1e2f2",
              "children": [
                {
                  "name": "Feature: Unchanged with output, from fixed inputs",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                },
                {
                  "name": "Curve shape: Horizontal straight line",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                }
              ]
            },
            {
              "name": "TVC (Total Variable Cost)",
              "level": 4,
              "color": "#d1e2f2",
              "children": [
                {
                  "name": "Feature: Rises with output, from variable inputs",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                },
                {
                  "name": "Curve shape: Upward sloping, shaped by diminishing returns",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                }
              ]
            },
            {
              "name": "TC (Total Cost)",
              "level": 4,
              "color": "#d1e2f2",
              "children": [
                {
                  "name": "Formula: TC = TFC + TVC",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "4.2 Average Cost Metrics (Per-unit Cost)",
          "level": 3,
          "color": "#a4c7e6",
          "children": [
            {
              "name": "AFC (Average Fixed Cost)",
              "level": 4,
              "color": "#d1e2f2",
              "children": [
                {
                  "name": "Formula: AFC = TFC / Q",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                },
                {
                  "name": "Feature: Continuous decline as output expands (fixed cost spread over more units)",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                }
              ]
            },
            {
              "name": "AVC (Average Variable Cost)",
              "level": 4,
              "color": "#d1e2f2",
              "children": [
                {
                  "name": "Formula: AVC = TVC / Q",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                },
                {
                  "name": "Shape: U-shaped",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                },
                {
                  "name": "Fall phase: Rising MPP improves labour efficiency",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                },
                {
                  "name": "Rise phase: Diminishing MPP causes resource crowding",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                }
              ]
            },
            {
              "name": "ATC / AC (Average Total Cost)",
              "level": 4,
              "color": "#d1e2f2",
              "children": [
                {
                  "name": "Formula: ATC = TC / Q = AFC + AVC",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                },
                {
                  "name": "Shape: U-shaped",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                },
                {
                  "name": "Fall at low output: Both AFC & AVC decline",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                },
                {
                  "name": "Rise at high output: Rising AVC offsets falling AFC",
                  "level": 5,
                  "color": "#e6f0fa",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "4.3 Marginal Cost (MC)",
          "level": 3,
          "color": "#a4c7e6",
          "children": [
            {
              "name": "Definition: Extra total cost to produce one additional unit of output",
              "level": 4,
              "color": "#d1e2f2",
              "leaf": true
            },
            {
              "name": "Formula: MC = ΔTC / ΔQ",
              "level": 4,
              "color": "#d1e2f2",
              "leaf": true
            },
            {
              "name": "Shape: U-shaped, inverse relationship with MPP",
              "level": 4,
              "color": "#d1e2f2",
              "leaf": true
            }
          ]
        },
        {
          "name": "4.4 Key MC & ATC Relationship",
          "level": 3,
          "color": "#a4c7e6",
          "children": [
            {
              "name": "MC < ATC → ATC falls",
              "level": 4,
              "color": "#d1e2f2",
              "leaf": true
            },
            {
              "name": "MC > ATC → ATC rises",
              "level": 4,
              "color": "#d1e2f2",
              "leaf": true
            },
            {
              "name": "MC crosses ATC exactly at ATC’s minimum point (productive efficiency)",
              "level": 4,
              "color": "#d1e2f2",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "5. Long-Run Costs: Scale Effects & LRATC",
      "level": 2,
      "color": "#994477",
      "children": [
        {
          "name": "5.1 LRATC (Long-Run Average Total Cost)",
          "level": 3,
          "color": "#d9b3cc",
          "children": [
            {
              "name": "Definition: Envelope curve of all short-run ATC curves",
              "level": 4,
              "color": "#eed9e4",
              "leaf": true
            },
            {
              "name": "Meaning: Lowest average cost for each output when all inputs are adjustable",
              "level": 4,
              "color": "#eed9e4",
              "leaf": true
            }
          ]
        },
        {
          "name": "5.2 Economies of Scale",
          "level": 3,
          "color": "#d9b3cc",
          "children": [
            {
              "name": "Definition: LRATC falls as output increases",
              "level": 4,
              "color": "#eed9e4",
              "leaf": true
            },
            {
              "name": "Root Causes",
              "level": 4,
              "color": "#eed9e4",
              "children": [
                {
                  "name": "Labour specialization & division of labour",
                  "level": 5,
                  "color": "#f7e7ef",
                  "leaf": true
                },
                {
                  "name": "Indivisible large machinery (minimum size equipment)",
                  "level": 5,
                  "color": "#f7e7ef",
                  "leaf": true
                },
                {
                  "name": "Container principle (larger containers cut per-unit logistics cost)",
                  "level": 5,
                  "color": "#f7e7ef",
                  "leaf": true
                },
                {
                  "name": "Higher efficiency of large-scale machines",
                  "level": 5,
                  "color": "#f7e7ef",
                  "leaf": true
                },
                {
                  "name": "Valuable production by-products",
                  "level": 5,
                  "color": "#f7e7ef",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "5.3 Constant Returns to Scale",
          "level": 3,
          "color": "#d9b3cc",
          "children": [
            {
              "name": "Definition: LRATC remains unchanged as output expands",
              "level": 4,
              "color": "#eed9e4",
              "leaf": true
            },
            {
              "name": "Rule: Doubling all inputs exactly doubles output",
              "level": 4,
              "color": "#eed9e4",
              "leaf": true
            }
          ]
        },
        {
          "name": "5.4 Diseconomies of Scale",
          "level": 3,
          "color": "#d9b3cc",
          "children": [
            {
              "name": "Definition: LRATC rises as output grows excessively",
              "level": 4,
              "color": "#eed9e4",
              "leaf": true
            },
            {
              "name": "Root Causes",
              "level": 4,
              "color": "#eed9e4",
              "children": [
                {
                  "name": "Management coordination failures & complex hierarchies",
                  "level": 5,
                  "color": "#f7e7ef",
                  "leaf": true
                },
                {
                  "name": "Worker alienation, low motivation & shirking",
                  "level": 5,
                  "color": "#f7e7ef",
                  "leaf": true
                },
                {
                  "name": "Deteriorated industrial relations & communication gaps",
                  "level": 5,
                  "color": "#f7e7ef",
                  "leaf": true
                },
                {
                  "name": "Interdependent production line delays & complications",
                  "level": 5,
                  "color": "#f7e7ef",
                  "leaf": true
                }
              ]
            }
          ]
        }
      ]
    }
  ]
},
        /* =======================Chapter 5======================= */
{
  "name": "Lecture 5: Perfect Competition",
  "level": 1,
  "expanded": true,
  "color": "#3969b1",
  "children": [
    {
      "name": "1. Four Market Structures (Classification Framework)",
      "level": 2,
      "color": "#82a6d8",
      "children": [
        {
          "name": "1.1 Classification Criteria (4 dimensions)",
          "level": 3,
          "color": "#c2d4ed",
          "children": [
            {
              "name": "Number of firms: many / few / single",
              "level": 4,
              "color": "#e1ebf8",
              "leaf": true
            },
            {
              "name": "Barriers to entry: unrestricted / restricted / blocked",
              "level": 4,
              "color": "#e1ebf8",
              "leaf": true
            },
            {
              "name": "Product characteristic: homogeneous / differentiated / unique",
              "level": 4,
              "color": "#e1ebf8",
              "leaf": true
            },
            {
              "name": "Pricing power: price taker / price maker",
              "level": 4,
              "color": "#e1ebf8",
              "leaf": true
            }
          ]
        },
        {
          "name": "1.2 4 Market Types Full Comparison",
          "level": 3,
          "color": "#c2d4ed",
          "children": [
            {
              "name": "A. Perfect Competition",
              "level": 4,
              "color": "#e1ebf8",
              "children": [
                {
                  "name": "Firms: Large quantity",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Entry: Unrestricted free entry & exit",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Product: Homogeneous/identical",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Power: Price taker",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Firm demand curve: Perfectly horizontal",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Examples: Carrots, cabbages, agricultural raw goods",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "B. Monopolistic Competition",
              "level": 4,
              "color": "#e1ebf8",
              "children": [
                {
                  "name": "Firms: Many",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Entry: Unrestricted",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Product: Differentiated",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Power: Minor price maker",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Firm demand curve: Downward-sloping, elastic",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Examples: Restaurants, plumbers",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "C. Oligopoly",
              "level": 4,
              "color": "#e1ebf8",
              "children": [
                {
                  "name": "Firms: Only a few",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Entry: Restricted high barriers",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Product: Homogeneous or differentiated",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Power: Moderate price control, interdependent firms",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Firm demand curve: Downward-sloping, inelastic",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Examples: Cars, petrol, electrical appliances",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "D. Pure Monopoly",
              "level": 4,
              "color": "#e1ebf8",
              "children": [
                {
                  "name": "Firms: One single firm",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Entry: Fully blocked / very high barriers",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Product: Unique, no substitutes",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Power: Full price maker",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Firm demand curve: Steep downward-sloping, highly inelastic",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                },
                {
                  "name": "Examples: Local water supply, patented prescription drugs",
                  "level": 5,
                  "color": "#f0f5fc",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "1.3 Definition Split",
          "level": 3,
          "color": "#c2d4ed",
          "children": [
            {
              "name": "Pure Competition = Perfect Competition",
              "level": 4,
              "color": "#e1ebf8",
              "leaf": true
            },
            {
              "name": "Imperfect Competition: Monopolistic Competition + Oligopoly + Monopoly",
              "level": 4,
              "color": "#e1ebf8",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "2. Revenue Calculations for Competitive Firms",
      "level": 2,
      "color": "#c94444",
      "children": [
        {
          "name": "2.1 Core Formulas",
          "level": 3,
          "color": "#f2b3b3",
          "children": [
            {
              "name": "Total Revenue TR = P × Q",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            },
            {
              "name": "Average Revenue AR = TR / Q = P",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            },
            {
              "name": "Marginal Revenue MR = ΔTR / ΔQ = P",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            }
          ]
        },
        {
          "name": "2.2 Fundamental Identity for Price Takers",
          "level": 3,
          "color": "#f2b3b3",
          "children": [
            {
              "name": "P = AR = MR",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            }
          ]
        },
        {
          "name": "2.3 Practical Example (Amari’s Apple Orchard)",
          "level": 3,
          "color": "#f2b3b3",
          "children": [
            {
              "name": "Fixed market price P=$20",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            },
            {
              "name": "All output levels have identical AR & MR = $20",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            },
            {
              "name": "TR rises linearly as quantity Q increases",
              "level": 4,
              "color": "#f9dede",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "3. Profit Maximization Decision Rules",
      "level": 2,
      "color": "#2b9958",
      "children": [
        {
          "name": "3.1 Profit Definition",
          "level": 3,
          "color": "#a6ddba",
          "children": [
            {
              "name": "Economic Profit π = TR − TC",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            }
          ]
        },
        {
          "name": "3.2 Method 1: TR-TC Total Curve Approach",
          "level": 3,
          "color": "#a6ddba",
          "children": [
            {
              "name": "TR: Linear upward sloping curve",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            },
            {
              "name": "TC: Upward curve, accelerates due to diminishing marginal returns",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            },
            {
              "name": "Max profit at quantity with largest vertical gap between TR and TC",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            }
          ]
        },
        {
          "name": "3.3 Method 2: MR = MC Marginal Analysis (Primary Rule)",
          "level": 3,
          "color": "#a6ddba",
          "children": [
            {
              "name": "If MR > MC: Increase output to raise profit",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            },
            {
              "name": "If MR < MC: Reduce output to raise profit",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            },
            {
              "name": "Profit-maximizing Q occurs where MR = MC",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            }
          ]
        },
        {
          "name": "3.4 Numerical Case (Amari’s Apple Orchard Profit Table)",
          "level": 3,
          "color": "#a6ddba",
          "children": [
            {
              "name": "Calculate TR, TC, Profit, MR, MC at each Q",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            },
            {
              "name": "Locate Q where MR equals MC for maximum profit",
              "level": 4,
              "color": "#d6efdf",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "4. Short-Run Equilibrium & Production Decisions",
      "level": 2,
      "color": "#9950b8",
      "children": [
        {
          "name": "4.1 Short-Run Core Assumption",
          "level": 3,
          "color": "#d2b9eb",
          "children": [
            {
              "name": "Fixed number of industry firms (no entry/exit)",
              "level": 4,
              "color": "#e9ddf6",
              "leaf": true
            },
            {
              "name": "Fixed Costs (FC) exist, must be paid even if shut down",
              "level": 4,
              "color": "#e9ddf6",
              "leaf": true
            },
            {
              "name": "Variable Costs (VC) only incurred when producing output",
              "level": 4,
              "color": "#e9ddf6",
              "leaf": true
            }
          ]
        },
        {
          "name": "4.2 Industry vs Individual Firm Graph Relationship",
          "level": 3,
          "color": "#d2b9eb",
          "children": [
            {
              "name": "Industry: Market D & S intersect to set equilibrium Pe",
              "level": 4,
              "color": "#e9ddf6",
              "leaf": true
            },
            {
              "name": "Single firm: Horizontal demand curve fixed at Pe (D=P=AR=MR)",
              "level": 4,
              "color": "#e9ddf6",
              "leaf": true
            }
          ]
        },
        {
          "name": "4.3 Two Short-Run Profit/Loss Outcomes",
          "level": 3,
          "color": "#d2b9eb",
          "children": [
            {
              "name": "4.3.1 Supernormal Economic Profit (P > ATC)",
              "level": 4,
              "color": "#e9ddf6",
              "children": [
                {
                  "name": "Profit per unit = P − ATC",
                  "level": 5,
                  "color": "#f3ecfb",
                  "leaf": true
                },
                {
                  "name": "Total Profit = (P − ATC) × Qmax",
                  "level": 5,
                  "color": "#f3ecfb",
                  "leaf": true
                }
              ]
            },
            {
              "name": "4.3.2 Economic Loss (P < ATC)",
              "level": 4,
              "color": "#e9ddf6",
              "children": [
                {
                  "name": "Loss per unit = ATC − P",
                  "level": 5,
                  "color": "#f3ecfb",
                  "leaf": true
                },
                {
                  "name": "Total Loss = (ATC − P) × Qmax",
                  "level": 5,
                  "color": "#f3ecfb",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "4.4 Short-Run Shut-Down Decision",
          "level": 3,
          "color": "#d2b9eb",
          "children": [
            {
              "name": "4.4.1 Outcome of Shutting Down: TR=0, only pay fixed costs",
              "level": 4,
              "color": "#e9ddf6",
              "leaf": true
            },
            {
              "name": "4.4.2 Produce condition: TR > VC → P > AVC",
              "level": 4,
              "color": "#e9ddf6",
              "children": [
                {
                  "name": "Loss smaller than total fixed cost",
                  "level": 5,
                  "color": "#f3ecfb",
                  "leaf": true
                }
              ]
            },
            {
              "name": "4.4.3 Shut down condition: TR < VC → P < AVC",
              "level": 4,
              "color": "#e9ddf6",
              "children": [
                {
                  "name": "Loss larger than total fixed cost; better to stop production",
                  "level": 5,
                  "color": "#f3ecfb",
                  "leaf": true
                }
              ]
            },
            {
              "name": "4.4.4 Shut-down point: Minimum point on AVC curve",
              "level": 4,
              "color": "#e9ddf6",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "5. Long-Run Equilibrium & Market Adjustment",
      "level": 2,
      "color": "#b47036",
      "children": [
        {
          "name": "5.1 Long-Run Core Assumption",
          "level": 3,
          "color": "#f2cca9",
          "children": [
            {
              "name": "All inputs variable; no permanent fixed costs",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Complete free entry and exit of firms",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            }
          ]
        },
        {
          "name": "5.2 Adjustment 1: Short-Run Positive Economic Profit",
          "level": 3,
          "color": "#f2cca9",
          "children": [
            {
              "name": "Step 1: P > ATC, existing firms earn supernormal profit",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Step 2: Profit attracts new firms to enter the industry",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Step 3: Market supply curve shifts right, total market output rises",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Step 4: Equilibrium market price falls",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Step 5: Price falls until P = min ATC, economic profit = 0",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            }
          ]
        },
        {
          "name": "5.3 Adjustment 2: Short-Run Economic Loss",
          "level": 3,
          "color": "#f2cca9",
          "children": [
            {
              "name": "Step 1: P < ATC, firms suffer losses",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Step 2: Loss pushes inefficient firms to exit the market",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Step 3: Market supply curve shifts left, total market output falls",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Step 4: Equilibrium market price rises",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Step 5: Price rises until P = min ATC, economic loss = 0",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            }
          ]
        },
        {
          "name": "5.4 Final Long-Run Equilibrium Condition",
          "level": 3,
          "color": "#f2cca9",
          "children": [
            {
              "name": "P = MR = MC = minimum ATC (Zero economic profit)",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            }
          ]
        },
        {
          "name": "5.5 Why Firms Stay in Business with Zero Economic Profit",
          "level": 3,
          "color": "#f2cca9",
          "children": [
            {
              "name": "TC includes implicit opportunity costs (owner time, capital return)",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            },
            {
              "name": "Zero economic profit = positive accounting profit (covers all costs & opportunity costs)",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "6. Two Types of Efficiency in Long-Run Perfect Competition",
      "level": 2,
      "color": "#7a4892",
      "children": [
        {
          "name": "6.1 Productive Efficiency (P = minimum ATC)",
          "level": 3,
          "color": "#d4bede",
          "children": [
            {
              "name": "Definition: Produce goods at the lowest possible average total cost",
              "level": 4,
              "color": "#e9dff2",
              "leaf": true
            },
            {
              "name": "Driving force: Free entry/exit forces cost minimization",
              "level": 4,
              "color": "#e9dff2",
              "leaf": true
            },
            {
              "name": "Benefit: Consumers pay the lowest sustainable price",
              "level": 4,
              "color": "#e9dff2",
              "leaf": true
            }
          ]
        },
        {
          "name": "6.2 Allocative Efficiency (P = MC)",
          "level": 3,
          "color": "#d4bede",
          "children": [
            {
              "name": "Definition: Resources allocated to produce goods society values most",
              "level": 4,
              "color": "#e9dff2",
              "leaf": true
            },
            {
              "name": "Logic",
              "level": 4,
              "color": "#e9dff2",
              "children": [
                {
                  "name": "P = Marginal Benefit (MB, consumer willingness to pay)",
                  "level": 5,
                  "color": "#f2eaf7",
                  "leaf": true
                },
                {
                  "name": "MC = Marginal Opportunity Cost of production",
                  "level": 5,
                  "color": "#f2eaf7",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Outcome: MB=MC, no deadweight loss, maximized social welfare",
              "level": 4,
              "color": "#e9dff2",
              "leaf": true
            }
          ]
        }
      ]
   	}
  ]
},

        /* =======================CHAPTER 6======================= */
{
  "name": "Lecture 6: Monopoly and Imperfect Competition",
  "level": 1,
  "expanded": true,
  "color": "#722f9e",
  "children": [
    {
      "name": "1. Pure Monopoly",
      "level": 2,
      "color": "#b994d9",
      "children": [
        {
          "name": "1.1 Definition & Core Characteristics",
          "level": 3,
          "color": "#ddcff0",
          "children": [
            {
              "name": "Single seller of product with no close substitutes",
              "level": 4,
              "color": "#eee6f8",
              "leaf": true
            },
            {
              "name": "Possess market power: price maker",
              "level": 4,
              "color": "#eee6f8",
              "leaf": true
            },
            {
              "name": "Face full market downward-sloping demand curve",
              "level": 4,
              "color": "#eee6f8",
              "leaf": true
            },
            {
              "name": "Protected by barriers to entry; can earn long-run economic profit",
              "level": 4,
              "color": "#eee6f8",
              "leaf": true
            }
          ]
        },
        {
          "name": "1.2 Three Barriers to Entry (Root Causes of Monopoly)",
          "level": 3,
          "color": "#ddcff0",
          "children": [
            {
              "name": "A. Natural Monopoly (Economies of Scale Barrier)",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Feature: High fixed cost, low marginal cost; continuous falling ATC",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Logic: One firm supplies whole market at lower ATC than multiple split firms",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Examples: Local electricity, water supply, public transit",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "B. Exclusive Ownership of Essential Key Resources",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Feature: One firm controls scarce production input",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Examples: De Beers diamond mines, sole town freshwater source",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Limitation: Rare in real markets due to resource substitutes",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "C. Government Legal Monopolies",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Forms: Patents (inventions/drugs), Copyrights (artistic works)",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Cost: Higher market prices & monopoly profits",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Benefit: Incentivize innovation, R&D and creative production",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "1.3 Revenue Comparison: Monopoly vs Perfect Competition",
          "level": 3,
          "color": "#ddcff0",
          "children": [
            {
              "name": "Universal Revenue Formulas (All Market Structures)",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "TR = P × Q",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "AR = TR / Q = P (AR always equals price)",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "MR = ΔTR / ΔQ (Change in total revenue per extra unit)",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Perfectly Competitive Firm",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Horizontal perfectly elastic demand curve",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "MR = AR = P (No price cut needed to sell more output)",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Monopolist Revenue Rules",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Two offsetting effects of raising output Q",
                  "level": 5,
                  "color": "#f6f0fc",
                  "children": [
                    {
                      "name": "Output effect: More units sold → raise TR",
                      "level": 6,
                      "color": "#faf6fe",
                      "leaf": true
                    },
                    {
                      "name": "Price effect: Cut price for all units → reduce TR",
                      "level": 6,
                      "color": "#faf6fe",
                      "leaf": true
                    }
                  ]
                },
                {
                  "name": "Core property: MR < P always",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Negative MR: Price effect > Output effect (TR falls when Q rises)",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Case Example: JJ’s Hair Salon Calculation Logic",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Calculate TR = P × Q for each quantity level",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "AR always matches price P",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "MR = Current TR − Previous TR (can be negative)",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "1.4 Monopoly Profit Maximization Mechanism",
          "level": 3,
          "color": "#ddcff0",
          "children": [
            {
              "name": "Step 1: Determine profit-max output quantity",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Universal rule: Produce Q where MR = MC",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Step 2: Set selling price",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Locate profit-max Q on market demand curve to get maximum consumer willingness-to-pay price",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Equilibrium condition: P > MR = MC",
              "level": 4,
              "color": "#eee6f8",
              "leaf": true
            },
            {
              "name": "Profit Calculation Formula",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Profit = (P − ATC) × Q",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Long-run profit/loss outcomes",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "P > ATC: Persistent positive economic profit (barriers block new entrants)",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "P < ATC: Economic loss → short-run shut down / long-run market exit",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "1.5 Welfare & Social Costs of Monopoly",
          "level": 3,
          "color": "#ddcff0",
          "children": [
            {
              "name": "Benchmark: Perfect Competition Efficient Equilibrium",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Equilibrium at P = MC, output = Qc (efficient quantity)",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Maximize total surplus = Consumer Surplus + Producer Surplus",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Allocative efficiency: P = MC",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Productive efficiency: Produce at minimum ATC",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Monopoly Inefficient Equilibrium",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Equilibrium at Pm > MR = MC, output = Qm < Qc (underproduction)",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Allocative inefficiency: Buyer’s marginal value (P) > marginal production cost (MC)",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Deadweight Loss (Core social cost)",
                  "level": 5,
                  "color": "#f6f0fc",
                  "children": [
                    {
                      "name": "Permanent lost total surplus from restricted output",
                      "level": 6,
                      "color": "#faf6fe",
                      "leaf": true
                    }
                  ]
                },
                {
                  "name": "Surplus redistribution",
                  "level": 5,
                  "color": "#f6f0fc",
                  "children": [
                    {
                      "name": "Consumer surplus shrinks (higher price, lower quantity)",
                      "level": 6,
                      "color": "#faf6fe",
                      "leaf": true
                    },
                    {
                      "name": "Part of consumer surplus transferred to monopolist as extra producer surplus",
                      "level": 6,
                      "color": "#faf6fe",
                      "leaf": true
                    },
                    {
                      "name": "DWL is wasted surplus captured by no market participant",
                      "level": 6,
                      "color": "#faf6fe",
                      "leaf": true
                    }
                  ]
                }
              ]
            },
            {
              "name": "Key Misconception Clarification",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Monopoly profit itself is only surplus transfer, not a social welfare loss; DWL is the real social cost",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "1.6 Potential Social Advantages of Monopolies",
          "level": 3,
          "color": "#ddcff0",
          "children": [
            {
              "name": "Economies of Scale (Natural Monopoly Strength)",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Large single firm lowers ATC via large plants, centralized management",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Avoid duplicated infrastructure costs; split market raises overall industry costs",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Sufficient Capital for R&D & Technology Innovation",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Long-run economic profit funds research and new technology",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Caveat: Protected monopolies may lack innovation incentives without competitive pressure",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Strong Incentives for New Product Development",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Perfect competition: New products quickly copied, economic profit eliminated",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                },
                {
                  "name": "Patent/copyright monopolies secure long-term profit rewards for original products",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Corporate Takeover Competition Discipline",
              "level": 4,
              "color": "#eee6f8",
              "children": [
                {
                  "name": "Inefficient monopolies face takeover threats; forced to cut costs and operate efficiently",
                  "level": 5,
                  "color": "#f6f0fc",
                  "leaf": true
                }
              ]
            }
          ]
        }
      ]
    },
    {
      "name": "2. Imperfect Competition Overview",
      "level": 2,
      "color": "#47a092",
      "children": [
        {
          "name": "Market Structure Continuum",
          "level": 3,
          "color": "#b3ddd6",
          "children": [
            {
              "name": "Perfect Competition → Monopolistic Competition → Oligopoly → Pure Monopoly",
              "level": 4,
              "color": "#d9ede9",
              "leaf": true
            }
          ]
        },
        {
          "name": "Shared feature of imperfect competition firms",
          "level": 3,
          "color": "#b3ddd6",
          "children": [
            {
              "name": "Partial market power (price maker)",
              "level": 4,
              "color": "#d9ede9",
              "leaf": true
            },
            {
              "name": "Downward-sloping individual firm demand curve",
              "level": 4,
              "color": "#d9ede9",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "3. Monopolistic Competition",
      "level": 2,
      "color": "#c48537",
      "children": [
        {
          "name": "3.1 Definition",
          "level": 3,
          "color": "#f2d0aa",
          "children": [
            {
              "name": "Many small independent sellers producing differentiated similar products (blend monopoly + perfect competition traits)",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            }
          ]
        },
        {
          "name": "3.2 Core Characteristics",
          "level": 3,
          "color": "#f2d0aa",
          "children": [
            {
              "name": "Large number of small sellers",
              "level": 4,
              "color": "#f9e6d7",
              "children": [
                {
                  "name": "Tiny individual market share",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                },
                {
                  "name": "No collusion possible",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                },
                {
                  "name": "Independent price & output decisions",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Differentiated products (source of weak market power)",
              "level": 4,
              "color": "#f9e6d7",
              "children": [
                {
                  "name": "Differentiation sources: product features, service, location, branding, packaging",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Downward-sloping but relatively elastic demand curve",
              "level": 4,
              "color": "#f9e6d7",
              "children": [
                {
                  "name": "Price maker, but many close substitutes exist",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                },
                {
                  "name": "Firms use advertising to build customer brand loyalty",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                }
              ]
            },
            {
              "name": "Free entry & exit (low barriers)",
              "level": 4,
              "color": "#f9e6d7",
              "children": [
                {
                  "name": "Low capital startup costs",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                },
                {
                  "name": "Minor barriers: advertising investment, trademark & brand construction",
                  "level": 5,
                  "color": "#fdf1e7",
                  "leaf": true
                }
              ]
            }
          ]
        },
        {
          "name": "3.3 Real Industry Examples",
          "level": 3,
          "color": "#f2d0aa",
          "children": [
            {
              "name": "Restaurants, sports apparel, bookstores, consumer electronics, coffee shops",
              "level": 4,
              "color": "#f9e6d7",
              "leaf": true
            }
          ]
        }
      ]
    },
    {
      "name": "4. Oligopoly",
      "level": 2,
      "color": "#2d5b99",
      "children": [
        {
          "name": "4.1 Definition",
          "level": 3,
          "color": "#a3bede",
          "children": [
            {
              "name": "Market dominated by a small number of large interdependent firms with substantial market power",
              "level": 4,
              "color": "#d1e2f2",
              "leaf": true
            }
          ]
        },
        {
          "name": "4.2 Core Characteristics",
          "level": 3,
          "color": "#a3bede",
          "children": [
            {
              "name": "Few large dominant producers",
              "level": 4,
              "color": "#d1e2f2",
              "children": [
                {
                  "name": "Formed via monopoly breakup or merger of small competitors",

    /* =====================================================
       🧠 TREE RENDER ENGINE (DO NOT TOUCH)
       ===================================================== */

    function createNode(node, isRoot) {

      var container = document.createElement('div');
      container.style.width = '100%';

      var row = document.createElement('div');
      row.style.display = 'flex';
      row.style.gap = '8px';
      row.style.alignItems = 'flex-start';

      var hasChildren = node.children && node.children.length > 0;

      var toggle = document.createElement('div');
      toggle.style.width = '22px';
toggle.style.height = '22px';
toggle.style.borderRadius = '8px';
toggle.style.fontSize = '12px';
toggle.style.fontWeight = '700';
toggle.style.boxShadow = '0 2px 6px rgba(0,0,0,0.15)';
toggle.style.transition = 'all 0.2s ease';      toggle.style.background = hasChildren ? node.color : 'transparent';
      toggle.style.color = '#fff';
      toggle.style.textAlign = 'center';
      toggle.style.cursor = hasChildren ? 'pointer' : 'default';
      toggle.textContent = hasChildren ? (node.expanded ? '−' : '+') : '•';

      var label = document.createElement('div');
      label.style.flex = '1';
      label.style.padding = '6px 10px';
      label.style.borderRadius = '8px';
label.style.background = isRoot
  ? node.color
  : 'linear-gradient(135deg, rgba(255,255,255,0.9), rgba(240,244,255,0.7))';      label.textContent = node.name;
  label.style.boxShadow = '0 2px 6px rgba(0,0,0,0.05)';
label.style.border = '1px solid rgba(0,0,0,0.06)';

      row.appendChild(toggle);
      row.appendChild(label);
      container.appendChild(row);

      var childrenBox = document.createElement('div');
      childrenBox.style.marginLeft = '24px';
      childrenBox.style.borderLeft = '1px dashed #ccc';
      childrenBox.style.paddingLeft = '10px';
      childrenBox.style.display = node.expanded ? 'block' : 'none';

      if (hasChildren) {
        node.children.forEach(child => {
          childrenBox.appendChild(createNode(child, false));
        });
      }

      if (hasChildren) container.appendChild(childrenBox);

      function toggleNode() {
        node.expanded = !node.expanded;
        childrenBox.style.display = node.expanded ? 'block' : 'none';
        toggle.textContent = node.expanded ? '−' : '+';
      }

      if (hasChildren) {
        toggle.onclick = toggleNode;
        label.onclick = toggleNode;
      }

      return container;
    }

    root.appendChild(createNode(treeData, true));

  } catch (e) {
    document.getElementById('tree-root').innerHTML =
      '<div style="padding:10px;color:#6B7280;">Error loading tree</div>';
  }
